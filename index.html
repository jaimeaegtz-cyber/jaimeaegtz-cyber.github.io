<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Inventario </title>

<style>

body{
font-family:'Segoe UI',sans-serif;
background:
linear-gradient(
180deg,
#020817,
#000f3a
);

margin:20px;

color:white;

}

/* CONTENEDOR */

.contenedor{

max-width:1600px;

margin:auto;

padding:20px;

}

/* TITULO */

h1{

font-size:36px;

margin-bottom:25px;

}

/* BLOQUES */

.seccion{

background:
rgba(
255,
255,
255,
.05
);

backdrop-filter:
blur(15px);

padding:30px;

border-radius:30px;

margin-bottom:35px;

border:
1px solid
rgba(
255,
255,
255,
.08
);

}

/* INPUTS */

.flex{

display:flex;

gap:20px;

align-items:end;

flex-wrap:wrap;

}

.control{

display:flex;

flex-direction:column;

gap:8px;

flex:1;

}

label{

font-size:14px;

opacity:.8;

}

input,
select{

height:64px;

padding:0 20px;

background:

rgba(
255,
255,
255,
.05
);

border:none;

border-radius:22px;

color:black;

font-size:22px;

outline:none;

}

/* BOTONES */

button{

height:82px;

padding:0 28px;

background:

linear-gradient(
135deg,
#1ea1ff,
#2563eb
);

border:none;

border-radius:22px;

color:white;

font-size:20px;

font-weight:700;

cursor:pointer;

transition:.2s;

}

button:hover{

transform:
translateY(-3px);

}

/* CARGANDO */

#loading{

display:none;

padding:20px;

background:

rgba(
14,
165,
233,
.2
);

border-radius:18px;

margin-bottom:25px;

}

/* TABLA → GRID */

table{

width:100%;

display:block;

}

thead{

display:none;

}

tbody{

display:grid;

grid-template-columns:

repeat(
auto-fit,
minmax(
340px,
1fr
)

);

gap:30px;

}

/* TARJETAS */

tbody tr{

display:flex;

flex-direction:column;

justify-content:space-between;

background:

linear-gradient(
180deg,
#111827,
#172036
);

border-radius:30px;

padding:30px;

min-height:280px;

box-shadow:

0 10px 40px

rgba(
0,
0,
0,
.45
);

transition:.2s;

}

tbody tr:hover{

transform:

translateY(-6px);

}

/* CELDAS */

tbody td{

padding:0;

border:none;

}

/* NOMBRE */

tbody td:first-child{

font-size:24px;

font-weight:800;

color:#67e8f9;

margin-bottom:40px;

}

/* CANTIDAD */

tbody td:nth-child(2){

display:flex;

justify-content:center;

align-items:center;

gap:16px;

margin-bottom:35px;

}

/* NUMERO */

tbody strong{

width:110px;

height:80px;

display:flex;

justify-content:center;

align-items:center;

background:

linear-gradient(
135deg,
#0ea5e9,
#2563eb
);

border-radius:999px;

font-size:40px;

font-weight:900;

}

/* + - */

.btn-sm{

width:70px;

height:70px;

padding:0;

display:flex;

justify-content:center;

align-items:center;

font-size:32px;

border-radius:20px;

}

/* ELIMINAR */

tbody td:last-child{

display:flex;

justify-content:center;

}

.btn-danger{

background:

linear-gradient(
135deg,
#ff4444,
#d90429
);

height:70px;

padding:0 34px;

font-size:22px;

}

/* RESPONSIVE */

@media(max-width:900px){

tbody{

grid-template-columns:

1fr;

}

.flex{

flex-direction:column;

align-items:stretch;

}

button{

width:100%;

}

}
  
</style>

</head>

<body>

<div class="contenedor">

<h1>📦 Gestión de Inventario</h1>

<div id="loading">
Sincronizando...
</div>

<div class="seccion">

<div class="control">

<label>Ubicación</label>

<select id="selector-pestaña">

<option>CAJA 1</option>
<option>CAJA 2</option>
<option>CAJA 3</option>
<option>CAJA 4</option>
<option>Bolsa 5</option>
<option>Caja 6</option>
<option>Caja Roja</option>

</select>

</div>

</div>

<div class="seccion">

<h3>Agregar componente</h3>

<div class="flex">

<div class="control">

<label>Nombre</label>

<input id="nuevo-nombre">

</div>

<div class="control">

<label>Cantidad</label>

<input
id="nueva-cantidad"
type="number"
value="1"
min="1">

</div>

<button onclick="agregarComponente()">
Guardar
</button>

</div>

</div>

<table>

<thead>

<tr>

<th>Componente</th>
<th>Cantidad</th>
<th>Acciones</th>

</tr>

</thead>

<tbody id="cuerpo-tabla"></tbody>

</table>

</div>

<script>

const SHEET_ID=
"1jyNvKPuqlGR8YmFxxYZVj0P9vSW9AmtkNpL2epdHXTs";

const SCRIPT_URL=
"https://script.google.com/macros/s/AKfycbzbmlIbhKCqOO7HvZKyNzsTGdSBCLwiMO8YuHJ03wnMPZn6EpVseZAUw996Yc2m8vQSkg/exec";

function mostrar(v){

document
.getElementById(
"loading"
)
.style.display=
v
?
"block"
:
"none";

}

async function cargarDatos(
silencioso=false
){

if(
!silencioso
){

mostrar(
true
);

}

try{

const hoja=
document
.getElementById(
"selector-pestaña"
)
.value;

const url=
`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(hoja)}`;

const r=
await fetch(
url
);

const txt=
await r.text();

const data=
JSON.parse(

txt.slice(

txt.indexOf(
"{"
),

txt.lastIndexOf(
"}"
)+1

)

);

const cuerpo=

document
.getElementById(
"cuerpo-tabla"
);

cuerpo.innerHTML="";

data.table.rows.forEach((f,i)=>{

if(
!f.c?.[0]?.v
)
return;

const nombre=
f.c[0].v;

const cantidad=
parseInt(
f.c?.[1]?.v||0
);

if(
cantidad<=0
)
return;

const fila=
i+2;

cuerpo.innerHTML+=`

<tr>

<td>

${nombre}

</td>

<td>

<button
class="btn-sm"

onclick="

modificarCantidad(

'${hoja}',

${fila},

${cantidad-1}

)

"

>

*

</button>

<strong>

${cantidad}

</strong>

<button
class="btn-sm"

onclick="

modificarCantidad(

'${hoja}',

${fila},

${cantidad+1}

)

"

>

*

</button>

</td>

<td>

<button

class="btn-danger"

onclick="

eliminarComponente(

'${hoja}',

${fila}

)

"

>

Eliminar

</button>

</td>

</tr>

`;

});

}

catch(e){

console.log(
e
);

if(
!silencioso
){

alert(
"Error cargando"
);

}

}

if(
!silencioso
){

mostrar(
false
);

}

}


async function enviar(data){

await fetch(
SCRIPT_URL,
{

method:"POST",

headers:{
"Content-Type":
"application/json"
},

body:
JSON.stringify(
data
)

}

);

}

async function agregarComponente(){

const nombre=
document
.getElementById(
"nuevo-nombre"
)
.value
.trim();

if(!nombre)
return;

const cantidad=
parseInt(
document
.getElementById(
"nueva-cantidad"
)
.value
);

const hoja=
document
.getElementById(
"selector-pestaña"
)
.value;

const url=
`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(hoja)}`;

const r=
await fetch(url);

const txt=
await r.text();

const data=
JSON.parse(
txt.slice(
txt.indexOf("{"),
txt.lastIndexOf("}")+1
)
);

let encontrado=
false;

for(
let i=0;
i<data.table.rows.length;
i++
){

const fila=
data.table.rows[i];

const nombreActual=
fila?.c?.[0]?.v
?.toString()
.toLowerCase();

const cantidadActual=
parseInt(
fila?.c?.[1]?.v||0
);

if(
nombreActual===
nombre.toLowerCase()
){

await enviar({

action:"update",

sheetName:hoja,

fila:i+2,

cantidad:
cantidadActual
+
cantidad

});

encontrado=true;

break;

}

}

if(!encontrado){

await enviar({

action:"add",

sheetName:hoja,

componente:nombre,

cantidad

});

}

document
.getElementById(
"nuevo-nombre"
)
.value="";

document
.getElementById(
"nueva-cantidad"
)
.value=1;

await cargarDatos(
  true
);
}

async function modificarCantidad(
hoja,
fila,
cantidad
){

if(cantidad<0)
return;

await enviar({

action:"update",

sheetName:hoja,

fila,

cantidad

});

await cargarDatos();

}

async function eliminarComponente(
hoja,
fila
){

if(
!confirm(
"¿Eliminar?"
)
)
return;

await enviar({

action:"delete",

sheetName:hoja,

fila

});

await cargarDatos();

}

let actualizando=
false;

async function actualizarSuave(){

if(
actualizando
)
return;

actualizando=true;

try{

await cargarDatos(
true
);

}

catch(e){

console.log(
e
);

}

finally{

actualizando=false;

}

}


document
.getElementById(
"selector-pestaña"
)
.addEventListener(
"change",
cargarDatos
);

window.onload=()=>{

cargarDatos();

setInterval(

()=>{

actualizarSuave();

},

8000

);

};


</script>

</body>

</html>
