<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistema de Inventario Pro</title>

<style>

body{
font-family:'Segoe UI';
background:#f1f5f9;
margin:20px;
}

.contenedor{
max-width:1000px;
margin:auto;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,.1);
}

h1{
margin-top:0;
color:#0f172a;
}

.seccion{
background:#f8fafc;
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

.flex{
display:flex;
gap:10px;
flex-wrap:wrap;
align-items:end;
}

.control{
display:flex;
flex-direction:column;
gap:5px;
}

input,
select,
button{
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#0284c7;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#0369a1;
}

.btn-sm{
padding:5px 10px;
}

.btn-danger{
background:#ef4444;
}

.btn-danger:hover{
background:#dc2626;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
}

th{
background:#1e293b;
color:white;
}

#loading{
display:none;
padding:10px;
background:#dbeafe;
border-radius:10px;
margin-bottom:20px;
}

</style>

</head>

<body>

<div class="contenedor">

<h1>📦 Gestión de Inventario</h1>

<div id="loading">
Sincronizando...
</div>

<div class="seccion">

<div class="control">

<label>Ubicación</label>

<select id="selector-pestaña">

<option>CAJA 1</option>
<option>CAJA 2</option>
<option>CAJA 3</option>
<option>CAJA 4</option>
<option>Bolsa 5</option>
<option>Caja 6</option>
<option>Caja Roja</option>

</select>

</div>

</div>

<div class="seccion">

<h3>Agregar componente</h3>

<div class="flex">

<div class="control">
<label>Nombre</label>
<input id="nuevo-nombre">
</div>

<div class="control">
<label>Cantidad</label>
<input
id="nueva-cantidad"
type="number"
value="1"
min="1">
</div>

<button onclick="agregarComponente()">
Guardar
</button>

</div>

</div>

<table>

<thead>

<tr>

<th>Componente</th>
<th>Cantidad</th>
<th>Acciones</th>

</tr>

</thead>

<tbody id="cuerpo-tabla">

</tbody>

</table>

</div>

<script>

const SHEET_ID =
"1jyNvKPuqlGR8YmFxxYZVj0P9vSW9AmtkNpL2epdHXTs";

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbzbmlIbhKCqOO7HvZKyNzsTGdSBCLwiMO8YuHJ03wnMPZn6EpVseZAUw996Yc2m8vQSkg/exec";

async function cargarDatos(){

mostrar(true);

try{

const hoja =
document
.getElementById(
"selector-pestaña"
)
.value;

const url =
`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(hoja)}`;

const r =
await fetch(url);

const txt =
await r.text();

const inicio =
txt.indexOf("{");

const fin =
txt.lastIndexOf("}");

if(
inicio===-1||
fin===-1
){
throw Error(
"Sheet privado o pestaña inexistente"
);
}

const data =
JSON.parse(
txt.slice(
inicio,
fin+1
)
);

const filas =
data.table.rows;

const cuerpo =
document.getElementById(
"cuerpo-tabla"
);

cuerpo.innerHTML="";

filas.forEach((f,i)=>{

if(
!f.c?.[0]?.v
)
return;

const nombre =
f.c[0].v;

const cantidad =
f.c[1]?.v||0;

const fila =
i+2;

cuerpo.innerHTML+=`

<tr>

<td>${nombre}</td>

<td>

<button
class="btn-sm"

onclick="
modificarCantidad(
'${hoja}',
${fila},
${cantidad-1}
)
">

-

</button>

<strong>

${cantidad}

</strong>

<button
class="btn-sm"

onclick="
modificarCantidad(
'${hoja}',
${fila},
${cantidad+1}
)
">

+

</button>

</td>

<td>

<button

class="btn-danger"

onclick="
eliminarComponente(
'${hoja}',
${fila}
)
"

>

Eliminar

</button>

</td>

</tr>

`;

});

}
catch(e){

console.log(e);

alert(
"Error cargando datos\n\n"+
e.message
);

}

mostrar(false);

}

async function agregarComponente(){

const nombre =
document
.getElementById(
"nuevo-nombre"
)
.value
.trim();

if(!nombre)
return;

const cantidad =
document
.getElementById(
"nueva-cantidad"
)
.value;

const hoja =
document
.getElementById(
"selector-pestaña"
)
.value;

await fetch(
SCRIPT_URL,
{
method:"POST",

body:
JSON.stringify({

action:"add",

sheetName:hoja,

componente:nombre,

cantidad

})
}
);

cargarDatos();

}

async function modificarCantidad(
hoja,
fila,
cantidad
){

if(cantidad<0)
return;

await fetch(
SCRIPT_URL,
{
method:"POST",

body:
JSON.stringify({

action:"update",

sheetName:hoja,

fila,

cantidad

})
}
);

cargarDatos();

}

async function eliminarComponente(
hoja,
fila
){

await fetch(
SCRIPT_URL,
{
method:"POST",

body:
JSON.stringify({

action:"delete",

sheetName:hoja,

fila

})
}
);

cargarDatos();

}

function mostrar(v){

document
.getElementById(
"loading"
)
.style.display =
v
?
"block"
:
"none";

}

document
.getElementById(
"selector-pestaña"
)
.addEventListener(
"change",
cargarDatos
);

window.onload =
cargarDatos;

</script>

</body>

</html>
