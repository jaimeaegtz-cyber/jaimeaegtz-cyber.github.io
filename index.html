<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistema de Inventario Pro</title>

<style>
body{
font-family:'Segoe UI',sans-serif;
margin:0;
padding:30px;

background:
linear-gradient(
135deg,
#dbeafe,
#f8fafc,
#ffffff
);

min-height:100vh;
}

.contenedor{

max-width:1200px;

margin:auto;

background:
rgba(255,255,255,.75);

backdrop-filter:
blur(20px);

padding:30px;

border-radius:30px;

box-shadow:
0 25px 60px
rgba(0,0,0,.08);

}

h1{

margin-top:0;

font-size:2.3rem;

font-weight:800;

color:#0f172a;

}

.seccion{

background:white;

padding:22px;

border-radius:22px;

margin-bottom:25px;

box-shadow:
0 10px 30px
rgba(0,0,0,.05);

}

.flex{

display:flex;

gap:15px;

flex-wrap:wrap;

align-items:end;

}

.control{

display:flex;

flex-direction:column;

gap:8px;

flex:1;

}

label{

font-size:.9rem;

font-weight:700;

color:#475569;

}

input,
select{

padding:14px;

border-radius:16px;

border:2px solid #dbeafe;

font-size:15px;

transition:.25s;

outline:none;

background:white;

}

input:focus,
select:focus{

border-color:#0ea5e9;

box-shadow:
0 0 0 6px
rgba(14,165,233,.15);

}

button{

padding:14px 18px;

border:none;

border-radius:999px;

background:
linear-gradient(
135deg,
#0ea5e9,
#0284c7
);

color:white;

font-weight:700;

cursor:pointer;

transition:.2s;

}

button:hover{

transform:
translateY(-3px);

box-shadow:
0 12px 25px
rgba(2,132,199,.3);

}

button:active{

transform:
scale(.96);

}

.btn-sm{

width:42px;

height:42px;

padding:0;

font-size:20px;

}

.btn-danger{

background:
linear-gradient(
135deg,
#ef4444,
#dc2626
);

}

.btn-danger:hover{

box-shadow:
0 12px 25px
rgba(239,68,68,.3);

}

.grid{

display:grid;

grid-template-columns:
repeat(
auto-fill,
minmax(
300px,
1fr
)
);

gap:20px;

}

.card{

background:
linear-gradient(
145deg,
white,
#f8fafc
);

padding:24px;

border-radius:26px;

display:flex;

flex-direction:column;

gap:20px;

box-shadow:
0 12px 35px
rgba(0,0,0,.08);

transition:.25s;

}

.card:hover{

transform:
translateY(-6px);

}

.titulo{

font-size:1.25rem;

font-weight:800;

color:#0f172a;

word-break:break-word;

}

.cantidad{

display:flex;

justify-content:center;

align-items:center;

gap:16px;

}

.cantidad span{

font-size:2.2rem;

font-weight:900;

color:#0284c7;

background:#e0f2fe;

padding:10px 22px;

border-radius:999px;

min-width:60px;

text-align:center;

}

#loading{

display:none;

padding:18px;

background:
linear-gradient(
90deg,
#dbeafe,
#f0f9ff
);

border-radius:18px;

font-weight:700;

animation:
loading 1s infinite;

}

@keyframes loading{

50%{
opacity:.55;
}

}

table{
display:none;
}

@media(max-width:700px){

body{
padding:15px;
}

.contenedor{
padding:20px;
}

.flex{
flex-direction:column;
}

.grid{

grid-template-columns:
1fr;

}

h1{

font-size:1.8rem;

}

}
</style>

</head>

<body>

<div class="contenedor">

<h1>📦 Gestión de Inventario</h1>

<div id="loading">
Sincronizando...
</div>

<div class="seccion">

<div class="control">

<label>Ubicación</label>

<select id="selector-pestaña">

<option>CAJA 1</option>
<option>CAJA 2</option>
<option>CAJA 3</option>
<option>CAJA 4</option>
<option>Bolsa 5</option>
<option>Caja 6</option>
<option>Caja Roja</option>

</select>

</div>

</div>

<div class="seccion">

<h3>Agregar componente</h3>

<div class="flex">

<div class="control">
<label>Nombre</label>
<input id="nuevo-nombre">
</div>

<div class="control">
<label>Cantidad</label>
<input
id="nueva-cantidad"
type="number"
value="1"
min="1">
</div>

<button onclick="agregarComponente()">
Guardar
</button>

</div>

</div>

<table>

<thead>

<tr>

<th>Componente</th>
<th>Cantidad</th>
<th>Acciones</th>

</tr>

</thead>

<tbody id="cuerpo-tabla">

</tbody>

</table>

</div>

<script>

const SHEET_ID =
"1jyNvKPuqlGR8YmFxxYZVj0P9vSW9AmtkNpL2epdHXTs";

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbzbmlIbhKCqOO7HvZKyNzsTGdSBCLwiMO8YuHJ03wnMPZn6EpVseZAUw996Yc2m8vQSkg/exec";

async function cargarDatos(){

if(
document
.getElementById(
"cuerpo-tabla"
)
.innerHTML === ""
){
mostrar(true);
}

try{

const hoja =
document
.getElementById(
"selector-pestaña"
)
.value;

const url =
`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(hoja)}`;

const r =
await fetch(url);

const txt =
await r.text();

const inicio =
txt.indexOf("{");

const fin =
txt.lastIndexOf("}");

if(
inicio===-1||
fin===-1
){
throw Error(
"Sheet privado o pestaña inexistente"
);
}

const data =
JSON.parse(
txt.slice(
inicio,
fin+1
)
);

const filas =
data.table.rows;

const cuerpo =
document.getElementById(
"cuerpo-tabla"
);

cuerpo.innerHTML="";

filas.forEach((f,i)=>{

if(
!f.c?.[0]?.v
)
return;

const nombre =
f.c[0].v;

const cantidad =
f.c[1]?.v||0;

if(cantidad<=0)
return;

const fila =
i+2;

cuerpo.innerHTML+=`

<tr>

<td>${nombre}</td>

<td>

<button
class="btn-sm"

onclick="
modificarCantidad(
'${hoja}',
${fila},
${cantidad-1}
)
">

-

</button>

<strong>

${cantidad}

</strong>

<button
class="btn-sm"

onclick="
modificarCantidad(
'${hoja}',
${fila},
${cantidad+1}
)
">

+

</button>

</td>

<td>

<button

class="btn-danger"

onclick="
eliminarComponente(
'${hoja}',
${fila}
)
"

>

Eliminar

</button>

</td>

</tr>

`;

});

}
catch(e){

console.log(e);

alert(
"Error cargando datos\n\n"+
e.message
);

}

mostrar(false);

}

async function agregarComponente(){

const nombre =
document
.getElementById(
"nuevo-nombre"
)
.value
.trim();

if(!nombre)
return;

const cantidad =
document
.getElementById(
"nueva-cantidad"
)
.value;

const hoja =
document
.getElementById(
"selector-pestaña"
)
.value;

await fetch(
SCRIPT_URL,
{
method:"POST",

body:
JSON.stringify({

action:"add",

sheetName:hoja,

componente:nombre,

cantidad

})
}
);

cargarDatos();

}

async function modificarCantidad(
hoja,
fila,
cantidad
){

if(cantidad<0)
return;

await fetch(
SCRIPT_URL,
{
method:"POST",

body:
JSON.stringify({

action:"update",

sheetName:hoja,

fila,

cantidad

})
}
);

cargarDatos();

}

async function eliminarComponente(
hoja,
fila
){

await fetch(
SCRIPT_URL,
{
method:"POST",

body:
JSON.stringify({

action:"delete",

sheetName:hoja,

fila

})
}
);

cargarDatos();

}

function mostrar(v){

document
.getElementById(
"loading"
)
.style.display =
v
?
"block"
:
"none";

}

document
.getElementById(
"selector-pestaña"
)
.addEventListener(
"change",
cargarDatos
);

let actualizando = false;

async function actualizarSuave(){

if(actualizando)
return;

actualizando = true;

try{

await cargarDatos();

}
finally{

actualizando = false;

}

}

window.onload = ()=>{

actualizarSuave();

setInterval(
actualizarSuave,
500
);

};

</script>

</body>

</html>
