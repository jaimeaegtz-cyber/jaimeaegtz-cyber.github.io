<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Inventario </title>

<style>

body{
font-family:'Segoe UI',sans-serif;

background:
linear-gradient(
180deg,
#020817,
#000f3a
);

margin:20px;

color:white;

}

.contenedor{

max-width:1700px;

margin:auto;

padding:20px;

}

h1{

font-size:36px;

margin-bottom:25px;

}

/* BLOQUES */

.seccion{

background:
rgba(
255,
255,
255,
.05
);

backdrop-filter:
blur(15px);

padding:30px;

border-radius:30px;

margin-bottom:35px;

border:

1px solid

rgba(
255,
255,
255,
.08
);

}

/* FILAS */

.flex{

display:flex;

gap:20px;

align-items:end;

flex-wrap:wrap;

}

.control{

display:flex;

flex-direction:column;

gap:8px;

flex:1;

}

label{

font-size:14px;

opacity:.8;

}

/* INPUTS */

input,
select{

height:74px;

padding:0 22px;

background:

rgba(
255,
255,
255,
.05
);

border:none;

border-radius:22px;

color:white;

font-size:20px;

outline:none;

}

/* SELECTOR DE CAJAS */

.ubicacion-row{

display:flex;

align-items:center;

gap:14px;

width:100%;

}

#selector-pestaña{

flex:1;

width:100%;

min-width:0;

height:82px;

padding-left:24px;

font-size:22px;

}

/* BOTONES DERECHA */

.ubicacion-row button{

width:96px;

min-width:96px;

height:82px;

padding:0;

display:flex;

justify-content:center;

align-items:center;

font-size:34px;

}

/* BOTONES */

button{

background:

linear-gradient(
135deg,
#1ea1ff,
#2563eb
);

border:none;

border-radius:22px;

color:white;

cursor:pointer;

font-size:20px;

font-weight:700;

transition:.2s;

}

button:hover{

transform:
translateY(-4px);

}

.btn-danger{

background:

linear-gradient(
135deg,
#ff3b3b,
#d90429
);

}

/* CARGANDO */

#loading{

display:none;

padding:18px;

background:

rgba(
14,
165,
233,
.15
);

border-radius:18px;

margin-bottom:25px;

}

/* TARJETAS */

table{

width:100%;

display:block;

}

thead{

display:none;

}

tbody{

display:grid;

grid-template-columns:

repeat(
auto-fit,
minmax(
340px,
1fr
)

);

gap:30px;

}

tbody tr{

display:flex;

flex-direction:column;

justify-content:space-between;

background:

linear-gradient(
180deg,
#111827,
#172036
);

padding:30px;

border-radius:30px;

min-height:280px;

}

tbody td{

padding:0;

border:none;

}

tbody td:first-child{

font-size:24px;

font-weight:800;

color:#67e8f9;

margin-bottom:40px;

}

tbody td:nth-child(2){

display:flex;

justify-content:center;

align-items:center;

gap:16px;

margin-bottom:30px;

}

tbody strong{

display:flex;

justify-content:center;

align-items:center;

width:110px;

height:80px;

border-radius:999px;

background:

linear-gradient(
135deg,
#0ea5e9,
#2563eb
);

font-size:38px;

font-weight:900;

}

.btn-sm{

width:70px;

height:70px;

padding:0;

display:flex;

justify-content:center;

align-items:center;

font-size:30px;

border-radius:20px;

}

tbody td:last-child{

display:flex;

justify-content:center;

}

.btn-danger{

height:70px;

padding:0 34px;

}

/* MOVIL */

@media(max-width:900px){

.flex{

flex-direction:column;

}

.ubicacion-row{

flex-wrap:wrap;

}

#selector-pestaña{

width:100%;

}

tbody{

grid-template-columns:
1fr;

}

button{

width:100%;

}

}

/* BOTON GUARDAR */

.flex > button{

width:220px !important;

height:82px !important;

font-size:32px !important;

padding:0 40px !important;

flex:none !important;

}

/* BOTONES + - */

tbody .btn-sm{

width:90px !important;

height:90px !important;

padding:0 !important;

font-size:0 !important;

position:relative;

}

/* DIBUJAR + */

tbody .btn-sm:last-child::before{

content:"+";

font-size:38px;

font-weight:900;

color:white;

}

/* DIBUJAR - */

tbody .btn-sm:first-child::before{

content:"−";

font-size:38px;

font-weight:900;

color:white;

}

/* INPUT CANTIDAD */

#nueva-cantidad{

font-size:34px;

text-align:center;

}

/* FLECHITAS DEL INPUT */

input[type=number]{

appearance:auto;

}

/* CENTRAR INPUT */

.control{

justify-content:flex-end;

}

/* SIDEBAR */

#sidebar{

position:fixed;

right:25px;

top:50%;

transform:
translateY(-50%);

display:flex;

flex-direction:column;

gap:16px;

z-index:999;

}

.nav-btn{

width:80px;

height:80px;

border-radius:24px;

font-size:34px;

}

.nav-btn.activo{

background:

linear-gradient(
135deg,
#06b6d4,
#2563eb
);

}

/* EXCEL */

#excel{

margin-top:20px;

height:80vh;

}

#excel-frame{

width:100%;

height:100%;

border:none;

border-radius:28px;

background:white;

}

<body>

<div class="contenedor"

id="inventario"

<h1>📦 Gestión de Inventario</h1>

<div id="loading">
Sincronizando...
</div>

<div class="seccion">

<div class="control">

<label>Ubicación</label>

<div class="ubicacion-row">

<select id="selector-pestaña">
</select>

<button onclick="crearCaja()">
＋
</button>

<button onclick="editarCaja()">
✏️
</button>

<button
class="btn-danger"
onclick="eliminarCaja()"

>

🗑 </button>

</div>


</div>

</div>

<div class="seccion">

<h3>Agregar componente</h3>

<div class="flex">

<div class="control">

<label>Nombre</label>

<input id="nuevo-nombre">

</div>

<div class="control">

<label>Cantidad</label>

<input
id="nueva-cantidad"
type="number"
value="1"
min="1">

</div>

<button onclick="agregarComponente()">
Guardar
</button>

</div>

</div>

<table>

<thead>

<tr>

<th>Componente</th>
<th>Cantidad</th>
<th>Acciones</th>

</tr>

</thead>

<tbody id="cuerpo-tabla"></tbody>

</table>

<div
id="excel"

style="display:none"

>

<iframe

id="excel-frame"

src="https://docs.google.com/spreadsheets/d/1jyNvKPuqlGR8YmFxxYZVj0P9vSW9AmtkNpL2epdHXTs/edit?usp=sharing"

>

</iframe>

</div>

  
</div>

<script>

const SHEET_ID=
"1jyNvKPuqlGR8YmFxxYZVj0P9vSW9AmtkNpL2epdHXTs";

const SCRIPT_URL=
"https://script.google.com/macros/s/AKfycbzbmlIbhKCqOO7HvZKyNzsTGdSBCLwiMO8YuHJ03wnMPZn6EpVseZAUw996Yc2m8vQSkg/exec";

function mostrar(v){

document
.getElementById(
"loading"
)
.style.display=
v
?
"block"
:
"none";

}

async function cargarDatos(
silencioso=false
){

if(
!silencioso
){

mostrar(
true
);

}

try{

const hoja=
document
.getElementById(
"selector-pestaña"
)
.value;

const url=
`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(hoja)}`;

const r=
await fetch(
url
);

const txt=
await r.text();

const data=
JSON.parse(

txt.slice(

txt.indexOf(
"{"
),

txt.lastIndexOf(
"}"
)+1

)

);

const cuerpo=

document
.getElementById(
"cuerpo-tabla"
);

cuerpo.innerHTML="";

data.table.rows.forEach((f,i)=>{

if(
!f.c?.[0]?.v
)
return;

const nombre=
f.c[0].v;

const cantidad=
parseInt(
f.c?.[1]?.v||0
);

if(
cantidad<=0
)
return;

const fila=
i+2;

cuerpo.innerHTML+=`

<tr>

<td>

${nombre}

</td>

<td>

<button
class="btn-sm"

onclick="

modificarCantidad(

'${hoja}',

${fila},

${cantidad-1}

)

"

>

*

</button>

<strong>

${cantidad}

</strong>

<button
class="btn-sm"

onclick="

modificarCantidad(

'${hoja}',

${fila},

${cantidad+1}

)

"

>

*

</button>

</td>

<td>

<button

class="btn-danger"

onclick="

eliminarComponente(

'${hoja}',

${fila}

)

"

>

Eliminar

</button>

</td>

</tr>

`;

});

}

catch(e){

console.log(
e
);

if(
!silencioso
){

alert(
"Error cargando"
);

}

}

if(
!silencioso
){

mostrar(
false
);

}

}


async function enviar(data){

await fetch(
SCRIPT_URL,
{

method:"POST",

headers:{
"Content-Type":
"application/json"
},

body:
JSON.stringify(
data
)

}

);

}

async function agregarComponente(){

const nombre=
document
.getElementById(
"nuevo-nombre"
)
.value
.trim();

if(!nombre)
return;

const cantidad=
parseInt(
document
.getElementById(
"nueva-cantidad"
)
.value
);

const hoja=
document
.getElementById(
"selector-pestaña"
)
.value;

const url=
`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(hoja)}`;

const r=
await fetch(url);

const txt=
await r.text();

const data=
JSON.parse(
txt.slice(
txt.indexOf("{"),
txt.lastIndexOf("}")+1
)
);

let encontrado=
false;

for(
let i=0;
i<data.table.rows.length;
i++
){

const fila=
data.table.rows[i];

const nombreActual=
fila?.c?.[0]?.v
?.toString()
.toLowerCase();

const cantidadActual=
parseInt(
fila?.c?.[1]?.v||0
);

if(
nombreActual===
nombre.toLowerCase()
){

await enviar({

action:"update",

sheetName:hoja,

fila:i+2,

cantidad:
cantidadActual
+
cantidad

});

encontrado=true;

break;

}

}

if(!encontrado){

await enviar({

action:"add",

sheetName:hoja,

componente:nombre,

cantidad

});

}

document
.getElementById(
"nuevo-nombre"
)
.value="";

document
.getElementById(
"nueva-cantidad"
)
.value=1;

await cargarDatos(
  true
);
}

async function modificarCantidad(
hoja,
fila,
cantidad
){

if(cantidad<0)
return;

await enviar({

action:"update",

sheetName:hoja,

fila,

cantidad

});

await cargarDatos();

}

async function eliminarComponente(
hoja,
fila
){

if(
!confirm(
"¿Eliminar?"
)
)
return;

await enviar({

action:"delete",

sheetName:hoja,

fila

});

await cargarDatos();

}

let actualizando=
false;

async function actualizarSuave(){

if(
actualizando
)
return;

actualizando=true;

try{

await cargarDatos(
true
);

}

catch(e){

console.log(
e
);

}

finally{

actualizando=false;

}

}


document
.getElementById(
"selector-pestaña"
)
.addEventListener(
"change",
cargarDatos
);

const CAJAS_KEY=
"mis_cajas";

function obtenerCajas(){

const guardadas=

JSON.parse(

localStorage.getItem(
CAJAS_KEY
)

);

return guardadas||

[

"CAJA 1",

"CAJA 2",

"CAJA 3",

"CAJA 4",

"Bolsa 5",

"Caja 6",

"Caja Roja"

];

}

function guardarCajas(
lista
){

localStorage.setItem(

CAJAS_KEY,

JSON.stringify(
lista
)

);

}

function renderCajas(){

const selector=

document
.getElementById(
"selector-pestaña"
);

selector.innerHTML="";

obtenerCajas()

.forEach(

c=>{

selector.innerHTML+=`

<option>

${c}

</option>

`;

}

);

}

function crearCaja(){

const nombre=

prompt(
"Nombre:"
);

if(
!nombre
)
return;

const cajas=
obtenerCajas();

cajas.push(
nombre
);

guardarCajas(
cajas
);

renderCajas();

}

function editarCaja(){

const selector=

document
.getElementById(
"selector-pestaña"
);

const actual=
selector.value;

const nuevo=

prompt(
"Nuevo nombre",
actual
);

if(
!nuevo
)
return;

const cajas=
obtenerCajas();

const i=
cajas.indexOf(
actual
);

if(
i!==-1
){

cajas[i]=
nuevo;

guardarCajas(
cajas
);

renderCajas();

}

}

function eliminarCaja(){

const selector=

document
.getElementById(
"selector-pestaña"
);

if(
!confirm(
"Eliminar caja?"
)
)
return;

guardarCajas(

obtenerCajas()

.filter(

x=>

x!==selector.value

)

);

renderCajas();

}

  
window.onload=()=>{

renderCajas();

cargarDatos();

setInterval(

actualizarSuave,

8000

);

};



</script>

<div id="sidebar">

<button
class="nav-btn activo"
onclick="mostrarVista('inventario')"

>

📦 </button>

<button
class="nav-btn"
onclick="mostrarVista('excel')"

>

📊 </button>

</div>

  
</body>

</html>
