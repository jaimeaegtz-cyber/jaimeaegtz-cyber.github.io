<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistema de Inventario Pro</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:
Inter,
Segoe UI,
sans-serif;

background:
linear-gradient(
160deg,
#020617,
#0f172a,
#111827
);

color:white;

min-height:100vh;

padding:40px;

}

.contenedor{

max-width:1200px;

margin:auto;

}

h1{

font-size:3rem;

margin-bottom:30px;

font-weight:900;

background:
linear-gradient(
90deg,
#38bdf8,
#22d3ee
);

-webkit-background-clip:text;

color:transparent;

}

.seccion{

background:
rgba(255,255,255,.05);

backdrop-filter:
blur(20px);

padding:25px;

border-radius:28px;

margin-bottom:25px;

border:
1px solid
rgba(255,255,255,.08);

}

.flex{

display:flex;

gap:15px;

flex-wrap:wrap;

}

.control{

flex:1;

display:flex;

flex-direction:column;

gap:8px;

}

label{

font-size:.8rem;

text-transform:uppercase;

opacity:.7;

}

input,
select{

padding:16px;

background:
rgba(255,255,255,.06);

border:none;

color:white;

border-radius:18px;

font-size:16px;

}

input:focus,
select:focus{

outline:none;

box-shadow:
0 0 0 3px
#38bdf8;

}

button{

padding:15px 22px;

border:none;

border-radius:18px;

cursor:pointer;

font-size:15px;

font-weight:700;

background:
linear-gradient(
135deg,
#0ea5e9,
#2563eb
);

color:white;

transition:.2s;

}

button:hover{

transform:
translateY(-5px);

box-shadow:
0 20px 50px
rgba(14,165,233,.3);

}

.btn-danger{

background:
linear-gradient(
135deg,
#ef4444,
#b91c1c
);

}

table{

border-collapse:separate;

border-spacing:0 15px;

}

thead{

display:none;

}

tbody{

display:grid;

grid-template-columns:
repeat(
auto-fill,
minmax(
300px,
1fr
)
);

gap:20px;

}

tr{

display:block;

background:
rgba(255,255,255,.05);

padding:25px;

border-radius:28px;

backdrop-filter:
blur(20px);

transition:.25s;

border:
1px solid
rgba(255,255,255,.08);

}

tr:hover{

transform:
translateY(-8px);

}

td{

display:block;

border:none;

padding:10px 0;

}

td:first-child{

font-size:1.3rem;

font-weight:800;

color:#67e8f9;

}

td:nth-child(2){

font-size:2rem;

text-align:center;

}

strong{

background:
#0284c7;

padding:8px 18px;

border-radius:999px;

}

#loading{

background:
#082f49;

padding:18px;

border-radius:18px;

margin-bottom:20px;

}

@media(max-width:700px){

body{
padding:20px;
}

h1{
font-size:2rem;
}

tbody{

grid-template-columns:
1fr;

}

}
  
</style>

</head>

<body>

<div class="contenedor">

<h1>📦 Gestión de Inventario</h1>

<div id="loading">
Sincronizando...
</div>

<div class="seccion">

<div class="control">

<label>Ubicación</label>

<select id="selector-pestaña">

<option>CAJA 1</option>
<option>CAJA 2</option>
<option>CAJA 3</option>
<option>CAJA 4</option>
<option>Bolsa 5</option>
<option>Caja 6</option>
<option>Caja Roja</option>

</select>

</div>

</div>

<div class="seccion">

<h3>Agregar componente</h3>

<div class="flex">

<div class="control">
<label>Nombre</label>
<input id="nuevo-nombre">
</div>

<div class="control">
<label>Cantidad</label>
<input
id="nueva-cantidad"
type="number"
value="1"
min="1">
</div>

<button onclick="agregarComponente()">
Guardar
</button>

</div>

</div>

<table>

<thead>

<tr>

<th>Componente</th>
<th>Cantidad</th>
<th>Acciones</th>

</tr>

</thead>

<tbody id="cuerpo-tabla">

</tbody>

</table>

</div>

<script>

const SHEET_ID =
"1jyNvKPuqlGR8YmFxxYZVj0P9vSW9AmtkNpL2epdHXTs";

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbzbmlIbhKCqOO7HvZKyNzsTGdSBCLwiMO8YuHJ03wnMPZn6EpVseZAUw996Yc2m8vQSkg/exec";

async function cargarDatos(){

if(
document
.getElementById(
"cuerpo-tabla"
)
.innerHTML === ""
){
mostrar(true);
}

try{

const hoja =
document
.getElementById(
"selector-pestaña"
)
.value;

const url =
`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(hoja)}`;

const r =
await fetch(url);

const txt =
await r.text();

const inicio =
txt.indexOf("{");

const fin =
txt.lastIndexOf("}");

if(
inicio===-1||
fin===-1
){
throw Error(
"Sheet privado o pestaña inexistente"
);
}

const data =
JSON.parse(
txt.slice(
inicio,
fin+1
)
);

const filas =
data.table.rows;

const cuerpo =
document.getElementById(
"cuerpo-tabla"
);

cuerpo.innerHTML="";

filas.forEach((f,i)=>{

if(
!f.c?.[0]?.v
)
return;

const nombre =
f.c[0].v;

const cantidad =
f.c[1]?.v||0;

if(cantidad<=0)
return;

const fila =
i+2;

cuerpo.innerHTML+=`

<tr>

<td>${nombre}</td>

<td>

<button
class="btn-sm"

onclick="
modificarCantidad(
'${hoja}',
${fila},
${cantidad-1}
)
">

-

</button>

<strong>

${cantidad}

</strong>

<button
class="btn-sm"

onclick="
modificarCantidad(
'${hoja}',
${fila},
${cantidad+1}
)
">

+

</button>

</td>

<td>

<button

class="btn-danger"

onclick="
eliminarComponente(
'${hoja}',
${fila}
)
"

>

Eliminar

</button>

</td>

</tr>

`;

});

}
catch(e){

console.log(e);

alert(
"Error cargando datos\n\n"+
e.message
);

}

mostrar(false);

}

async function agregarComponente(){

const nombre =
document
.getElementById(
"nuevo-nombre"
)
.value
.trim();

if(!nombre)
return;

const cantidad =
document
.getElementById(
"nueva-cantidad"
)
.value;

const hoja =
document
.getElementById(
"selector-pestaña"
)
.value;

await fetch(
SCRIPT_URL,
{
method:"POST",

body:
JSON.stringify({

action:"add",

sheetName:hoja,

componente:nombre,

cantidad

})
}
);

cargarDatos();

}

async function modificarCantidad(
hoja,
fila,
cantidad
){

if(cantidad<0)
return;

await fetch(
SCRIPT_URL,
{
method:"POST",

body:
JSON.stringify({

action:"update",

sheetName:hoja,

fila,

cantidad

})
}
);

cargarDatos();

}

async function eliminarComponente(
hoja,
fila
){

await fetch(
SCRIPT_URL,
{
method:"POST",

body:
JSON.stringify({

action:"delete",

sheetName:hoja,

fila

})
}
);

cargarDatos();

}

function mostrar(v){

document
.getElementById(
"loading"
)
.style.display =
v
?
"block"
:
"none";

}

document
.getElementById(
"selector-pestaña"
)
.addEventListener(
"change",
cargarDatos
);

let actualizando = false;

async function actualizarSuave(){

if(actualizando)
return;

actualizando = true;

try{

await cargarDatos();

}
finally{

actualizando = false;

}

}

window.onload = ()=>{

actualizarSuave();

setInterval(
actualizarSuave,
500
);

};

</script>

</body>

</html>
