<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Inventario Pro</title>

<style>
/* CONTENEDOR DE OBJETOS */
#cuerpo-tabla{
display:grid;

grid-template-columns:
repeat(
auto-fill,
minmax(
320px,
1fr
)
);

gap:28px;

align-items:start;

padding-top:20px;
}

/* TARJETA */
#cuerpo-tabla tr{

display:flex;

flex-direction:column;

justify-content:space-between;

background:
linear-gradient(
180deg,
#111827,
#0f172a
);

border:

1px solid
rgba(
255,
255,
255,
.06
);

border-radius:24px;

padding:28px;

min-height:260px;

box-shadow:
0 12px 40px
rgba(
0,
0,
0,
.35
);

transition:.25s;

}

#cuerpo-tabla tr:hover{

transform:
translateY(-4px);

}

/* NOMBRE */
#cuerpo-tabla td:first-child{

font-size:20px;

font-weight:700;

color:#67e8f9;

padding-bottom:20px;

border:none;

}

/* CELDA CANTIDAD */
#cuerpo-tabla td:nth-child(2){

display:flex;

justify-content:center;

align-items:center;

gap:14px;

border:none;

}

/* NUMERO */
#cuerpo-tabla strong{

display:flex;

align-items:center;

justify-content:center;

width:90px;

height:74px;

background:

linear-gradient(
135deg,
#0ea5e9,
#0284c7
);

border-radius:999px;

font-size:28px;

font-weight:800;

color:white;

text-align:center;

}

/* BOTONES + - */
.btn-sm{

width:64px;

height:64px;

border-radius:20px;

font-size:28px;

font-weight:700;

display:flex;

justify-content:center;

align-items:center;

}

/* ACCIONES */
#cuerpo-tabla td:last-child{

display:flex;

justify-content:center;

border:none;

padding-top:20px;

}

/* ELIMINAR */
.btn-danger{

padding:

16px 28px;

border-radius:18px;

font-size:20px;

}

/* RESPONSIVE */
@media(max-width:700px){

#cuerpo-tabla{

grid-template-columns:
1fr;

}

}
</style>

</head>

<body>

<div class="contenedor">

<h1>📦 Gestión de Inventario</h1>

<div id="loading">
Sincronizando...
</div>

<div class="seccion">

<div class="control">

<label>Ubicación</label>

<select id="selector-pestaña">

<option>CAJA 1</option>
<option>CAJA 2</option>
<option>CAJA 3</option>
<option>CAJA 4</option>
<option>Bolsa 5</option>
<option>Caja 6</option>
<option>Caja Roja</option>

</select>

</div>

</div>

<div class="seccion">

<h3>Agregar componente</h3>

<div class="flex">

<div class="control">

<label>Nombre</label>

<input id="nuevo-nombre">

</div>

<div class="control">

<label>Cantidad</label>

<input
id="nueva-cantidad"
type="number"
value="1"
min="1">

</div>

<button onclick="agregarComponente()">
Guardar
</button>

</div>

</div>

<table>

<thead>

<tr>

<th>Componente</th>
<th>Cantidad</th>
<th>Acciones</th>

</tr>

</thead>

<tbody id="cuerpo-tabla"></tbody>

</table>

</div>

<script>

const SHEET_ID=
"1jyNvKPuqlGR8YmFxxYZVj0P9vSW9AmtkNpL2epdHXTs";

const SCRIPT_URL=
"https://script.google.com/macros/s/AKfycbzbmlIbhKCqOO7HvZKyNzsTGdSBCLwiMO8YuHJ03wnMPZn6EpVseZAUw996Yc2m8vQSkg/exec";

function mostrar(v){

document
.getElementById(
"loading"
)
.style.display=
v
?
"block"
:
"none";

}

async function cargarDatos(){

mostrar(true);

try{

const hoja=
document
.getElementById(
"selector-pestaña"
)
.value;

const url=
`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(hoja)}`;

const r=
await fetch(url);

const txt=
await r.text();

const data=
JSON.parse(
txt.slice(
txt.indexOf("{"),
txt.lastIndexOf("}")+1
)
);

const cuerpo=
document.getElementById(
"cuerpo-tabla"
);

cuerpo.innerHTML="";

data.table.rows.forEach((f,i)=>{

if(!f.c?.[0]?.v)
return;

const nombre=
f.c[0].v;

const cantidad=
parseInt(
f.c?.[1]?.v||0
);

if(cantidad<=0)
return;

const fila=
i+2;

cuerpo.innerHTML+=`

<tr>

<td>${nombre}</td>

<td>

<button
class="btn-sm"
onclick="
modificarCantidad(
'${hoja}',
${fila},
${cantidad-1}
)
">

-

</button>

<strong>

${cantidad}

</strong>

<button
class="btn-sm"
onclick="
modificarCantidad(
'${hoja}',
${fila},
${cantidad+1}
)
">

+

</button>

</td>

<td>

<button
class="btn-danger"

onclick="
eliminarComponente(
'${hoja}',
${fila}
)
"

>

Eliminar

</button>

</td>

</tr>

`;

});

}

catch(e){

alert(
"Error cargando"
);

console.log(e);

}

mostrar(false);

}

async function enviar(data){

await fetch(
SCRIPT_URL,
{

method:"POST",

headers:{
"Content-Type":
"application/json"
},

body:
JSON.stringify(
data
)

}

);

}

async function agregarComponente(){

const nombre=
document
.getElementById(
"nuevo-nombre"
)
.value
.trim();

if(!nombre)
return;

const cantidad=
parseInt(
document
.getElementById(
"nueva-cantidad"
)
.value
);

const hoja=
document
.getElementById(
"selector-pestaña"
)
.value;

const url=
`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(hoja)}`;

const r=
await fetch(url);

const txt=
await r.text();

const data=
JSON.parse(
txt.slice(
txt.indexOf("{"),
txt.lastIndexOf("}")+1
)
);

let encontrado=
false;

for(
let i=0;
i<data.table.rows.length;
i++
){

const fila=
data.table.rows[i];

const nombreActual=
fila?.c?.[0]?.v
?.toString()
.toLowerCase();

const cantidadActual=
parseInt(
fila?.c?.[1]?.v||0
);

if(
nombreActual===
nombre.toLowerCase()
){

await enviar({

action:"update",

sheetName:hoja,

fila:i+2,

cantidad:
cantidadActual
+
cantidad

});

encontrado=true;

break;

}

}

if(!encontrado){

await enviar({

action:"add",

sheetName:hoja,

componente:nombre,

cantidad

});

}

document
.getElementById(
"nuevo-nombre"
)
.value="";

document
.getElementById(
"nueva-cantidad"
)
.value=1;

await cargarDatos();

}

async function modificarCantidad(
hoja,
fila,
cantidad
){

if(cantidad<0)
return;

await enviar({

action:"update",

sheetName:hoja,

fila,

cantidad

});

await cargarDatos();

}

async function eliminarComponente(
hoja,
fila
){

if(
!confirm(
"¿Eliminar?"
)
)
return;

await enviar({

action:"delete",

sheetName:hoja,

fila

});

await cargarDatos();

}

let actualizando=
false;

async function actualizarSuave(){

if(actualizando)
return;

actualizando=
true;

try{

await cargarDatos();

}

finally{

actualizando=
false;

}

}

document
.getElementById(
"selector-pestaña"
)
.addEventListener(
"change",
cargarDatos
);

window.onload=()=>{

actualizarSuave();

setInterval(
actualizarSuave,
8000
);

};

</script>

</body>

</html>
