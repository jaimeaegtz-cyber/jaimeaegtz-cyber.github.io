<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="icon" href="favicon.png" type="image/png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Iniciar sesión</title>
<script>
  // Si ya hay sesión activa, saltamos directo al inventario
  if (localStorage.getItem("sesion_usuario")) {
    window.location.href = "inventario.html";
  }
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #060c1a;
    --card: #111c32;
    --card2: #162038;
    --border: rgba(255,255,255,0.08);
    --accent: #3b82f6;
    --accent2: #60a5fa;
    --cyan: #22d3ee;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --muted2: #64748b;
    --radius: 16px;
    --radius-sm: 10px;
  }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .auth-card {
    width: 100%; max-width: 380px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 36px 32px;
  }
  .auth-logo { font-size: 40px; text-align: center; margin-bottom: 8px; }
  .auth-card h1 { font-size: 22px; font-weight: 700; text-align: center; margin-bottom: 4px; }
  .auth-card h1 span { color: var(--cyan); }
  .auth-sub { font-size: 14px; color: var(--muted); text-align: center; margin-bottom: 26px; }
  .field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .field label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted2); }
  .field input {
    height: 50px; padding: 0 16px;
    background: var(--card2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text);
    font-size: 15px; outline: none; transition: all 0.2s;
  }
  .field input:hover { border-color: rgba(255,255,255,0.15); }
  .field input:focus { border-color: rgba(59,130,246,0.5); box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
  .btn-primary {
    width: 100%; height: 50px; margin-top: 6px;
    background: var(--accent); border: none; border-radius: var(--radius-sm);
    color: white; font-size: 15px; font-weight: 600; cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary:hover { background: #2563eb; }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
  .auth-footer { text-align: center; margin-top: 22px; font-size: 14px; color: var(--muted); }
  .auth-footer a { color: var(--accent2); text-decoration: none; font-weight: 600; }
  .auth-footer a:hover { text-decoration: underline; }
  .error-msg {
    background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
    color: #fca5a5; font-size: 14px; padding: 10px 14px;
    border-radius: var(--radius-sm); margin-bottom: 16px; display: none;
  }
  .error-msg.visible { display: block; }
</style>
</head>
<body>

<div class="auth-card">
  <div class="auth-logo">📦</div>
  <h1>Gestión de <span>Inventario</span></h1>
  <p class="auth-sub">Inicia sesión para continuar</p>

  <div class="error-msg" id="error-msg"></div>

  <div class="field">
    <label>Usuario</label>
    <input id="usuario" placeholder="tu usuario" autocomplete="username">
  </div>
  <div class="field">
    <label>Contraseña</label>
    <input id="password" type="password" placeholder="••••••••" autocomplete="current-password">
  </div>
  <button class="btn-primary" id="btn-login" onclick="iniciarSesion()">Iniciar sesión</button>

  <div class="auth-footer">
    ¿No tienes cuenta? <a href="registro.html">Regístrate</a>
  </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwDDejCesX0MLKlr7FzPW6_wGCpyVHFrtHpjCF3dkM3YcgdS4EkFWLsteXD4GL5y_W5vg/exec";

async function enviar(data) {
  try {
    const res = await fetch(SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(data)
    });
    return await res.json();
  } catch (e) {
    return { status: "error", message: e.toString() };
  }
}

function mostrarError(msg) {
  const el = document.getElementById("error-msg");
  el.textContent = msg;
  el.classList.add("visible");
}

async function iniciarSesion() {
  const usuario = document.getElementById("usuario").value.trim();
  const password = document.getElementById("password").value;
  document.getElementById("error-msg").classList.remove("visible");

  if (!usuario || !password) {
    mostrarError("Completa usuario y contraseña.");
    return;
  }

  const btn = document.getElementById("btn-login");
  btn.disabled = true; btn.textContent = "Entrando...";

  const resp = await enviar({ action: "login", usuario, password });

  btn.disabled = false; btn.textContent = "Iniciar sesión";

  if (!resp || resp.status !== "success") {
    mostrarError(resp?.message || "No se pudo conectar con el servidor.");
    return;
  }

  localStorage.setItem("sesion_usuario", resp.usuario || usuario);
  localStorage.setItem("sesion_rol", resp.rol || "usuario");
  window.location.href = "inventario.html";
}

document.getElementById("usuario").addEventListener("keydown", e => {
  if (e.key === "Enter") document.getElementById("password").focus();
});
document.getElementById("password").addEventListener("keydown", e => {
  if (e.key === "Enter") iniciarSesion();
});
</script>
</body>
</html>
